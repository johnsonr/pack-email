name: email
description: "Abstract-inbox pack — declares the `email.thread` DomainType and the attention-worthiness rules (deterministic and LLM-judged) that operate on it. Provider-agnostic: any inbox integration (in-tree Gmail today, future pack-exchange / pack-imap) whose signals satisfy `email.thread` benefits from these rules without per-provider duplication."
